name: Codex Implementer Dispatcher

on:
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  dispatch:
    runs-on: ubuntu-latest

    steps:
      - name: Pick next implement-ready Codex issue
        id: pick
        env:
          GH_TOKEN: ${{ secrets.GH_CODEX_DISPATCH_TOKEN }}
        run: |
          ISSUE_JSON=$(gh issue list \
            --repo "$GITHUB_REPOSITORY" \
            --state open \
            --label "codex-candidate" \
            --label "codex-implement-ready" \
            --json number,title,url \
            --limit 1)

          ISSUE_NUMBER=$(echo "$ISSUE_JSON" | jq -r '.[0].number // empty')
          ISSUE_TITLE=$(echo "$ISSUE_JSON" | jq -r '.[0].title // empty')
          ISSUE_URL=$(echo "$ISSUE_JSON" | jq -r '.[0].url // empty')

          if [ -z "$ISSUE_NUMBER" ]; then
            echo "No implement-ready Codex issue found."
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Found issue #$ISSUE_NUMBER: $ISSUE_TITLE"
          echo "found=true" >> "$GITHUB_OUTPUT"
          echo "issue_number=$ISSUE_NUMBER" >> "$GITHUB_OUTPUT"
          echo "issue_title=$ISSUE_TITLE" >> "$GITHUB_OUTPUT"
          echo "issue_url=$ISSUE_URL" >> "$GITHUB_OUTPUT"

      - name: Mark issue as implementation dispatched
        if: steps.pick.outputs.found == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_CODEX_DISPATCH_TOKEN }}
          ISSUE_NUMBER: ${{ steps.pick.outputs.issue_number }}
        run: |
          gh issue edit "$ISSUE_NUMBER" \
            --repo "$GITHUB_REPOSITORY" \
            --remove-label "codex-implement-ready" \
            --add-label "codex-implement-dispatched"

      - name: Ask Codex to produce an implementation patch
        if: steps.pick.outputs.found == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_CODEX_DISPATCH_TOKEN }}
          ISSUE_NUMBER: ${{ steps.pick.outputs.issue_number }}
        run: |
          cat > /tmp/codex-request.md <<CODEX_REQUEST
          @codex

          Bitte bearbeite dieses Issue jetzt im Implementer-Patch-Mode.

          Aktuelles Issue:
          - Issue-Nummer: #$ISSUE_NUMBER
          - Task-ID: issue-$ISSUE_NUMBER

          Lies und befolge als verbindliche Anweisung:
          \`external/codex-control/prompts/implementer.md\`

          Wichtig für diesen Dispatch:
          - Erstelle keinen Pull Request.
          - Erwarte kein Git-Remote \`origin\`.
          - Pushe nichts nach GitHub.
          - Wenn du Code änderst, liefere das Ergebnis als unified diff / Patch im Issue-Kommentar.
          - Der Patch muss später von einer GitHub Action oder manuell angewendet werden können.
          - Verwende im Patch-Kontext die Issue-Bindung #$ISSUE_NUMBER.
          - Wenn der Planner Report unklar ist oder menschliche Entscheidung verlangt, implementiere nichts und kommentiere die Blockade.

          Falls \`external/codex-control/prompts/implementer.md\` nicht lesbar ist:
          - ändere nichts
          - erstelle keine Datei
          - erstelle keinen Branch
          - mache keinen Commit
          - kommentiere nur im aktuellen Issue exakt:
            "codex-control implementer prompt nicht lesbar"

          Erwartetes Ergebnis:
          Kommentiere im Issue einen Abschnitt mit exakt dieser Überschrift:

          ## Codex Implementer Patch Report

          Der Report muss enthalten:
          - Issue: #$ISSUE_NUMBER
          - Task-ID: issue-$ISSUE_NUMBER
          - Summary
          - Patch als unified diff in einem \`\`\`diff Codeblock
          - Tests / Checks
          - Risiken
          - Hinweise für die spätere PR-Erstellung
          CODEX_REQUEST

          echo "Posting Codex implementer patch request to issue #$ISSUE_NUMBER"
          cat /tmp/codex-request.md

          gh issue comment "$ISSUE_NUMBER" \
            --repo "$GITHUB_REPOSITORY" \
            --body-file /tmp/codex-request.md
