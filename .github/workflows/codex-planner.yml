name: Codex Planner

on:
  workflow_dispatch:
  schedule:
    - cron: "0 22 * * *"

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  planner:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run Codex Planner
        uses: openai/codex-action@v1
        with:
          prompt-file: codex-control/prompts/planner.md
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
