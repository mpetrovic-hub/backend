name: Codex Dispatcher

on:
  workflow_dispatch:
  # schedule:
  #   - cron: "0 22 * * *"

permissions:
  contents: read
  issues: write

jobs:
  dispatch:
    runs-on: ubuntu-latest

    steps:
      - name: Pick next Codex issue
        id: pick
        env:
          GH_TOKEN: ${{ secrets.GH_CODEX_DISPATCH_TOKEN }}
        run: |
          ISSUE_JSON=$(gh issue list \
            --repo "$GITHUB_REPOSITORY" \
            --state open \
            --label "codex-candidate" \
            --label "codex-ready" \
            --json number,title,url \
            --limit 1)

          ISSUE_NUMBER=$(echo "$ISSUE_JSON" | jq -r '.[0].number // empty')
          ISSUE_TITLE=$(echo "$ISSUE_JSON" | jq -r '.[0].title // empty')
          ISSUE_URL=$(echo "$ISSUE_JSON" | jq -r '.[0].url // empty')

          if [ -z "$ISSUE_NUMBER" ]; then
            echo "No ready Codex issue found."
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Found issue #$ISSUE_NUMBER: $ISSUE_TITLE"
          echo "found=true" >> "$GITHUB_OUTPUT"
          echo "issue_number=$ISSUE_NUMBER" >> "$GITHUB_OUTPUT"
          echo "issue_title=$ISSUE_TITLE" >> "$GITHUB_OUTPUT"
          echo "issue_url=$ISSUE_URL" >> "$GITHUB_OUTPUT"

      - name: Mark issue as dispatched
        if: steps.pick.outputs.found == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_CODEX_DISPATCH_TOKEN }}
          ISSUE_NUMBER: ${{ steps.pick.outputs.issue_number }}
        run: |
          gh issue edit "$ISSUE_NUMBER" \
            --repo "$GITHUB_REPOSITORY" \
            --remove-label "codex-ready" \
            --add-label "codex-dispatched"

      - name: Ask Codex to plan the issue
        if: steps.pick.outputs.found == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_CODEX_DISPATCH_TOKEN }}
          ISSUE_NUMBER: ${{ steps.pick.outputs.issue_number }}
        run: |
          PROMPT_URL="https://raw.githubusercontent.com/mpetrovic-hub/codex-control/main/prompts/planner.md"

          echo "Validating central planner prompt:"
          echo "$PROMPT_URL"

          mkdir -p /tmp/codex-prompts
          curl -fsSL "$PROMPT_URL" -o /tmp/codex-prompts/planner.md

          PROMPT_FIRST_LINE=$(head -n 1 /tmp/codex-prompts/planner.md | tr -d '\r')

          {
            cat <<'CODEX_HEADER'
          @codex

          Bitte bearbeite dieses Issue ausschließlich im Planner-Mode.

          Verwende den zentralen Planner-Prompt unter dieser Raw-URL:
          CODEX_HEADER

            printf '%s\n\n' "$PROMPT_URL"

            cat <<'CODEX_META'
          Dispatcher-Prüfung:
          - Die Raw-URL wurde vom Dispatcher vor dem Kommentar erfolgreich geladen.
          CODEX_META

            printf -- '- Erste Zeile des Prompts: %s\n\n' "$PROMPT_FIRST_LINE"

            cat <<'CODEX_FOOTER'
          Anweisung:
          1. Lies zuerst den Planner-Prompt aus der oben genannten Raw-URL.
          2. Befolge diesen Prompt als verbindliche Planner-Anweisung.
          3. Lies danach das aktuelle Issue und den relevanten Repository-Code.
          4. Schreibe ausschließlich einen Planner Report als Kommentar in dieses Issue.

          Falls du die Raw-URL nicht lesen kannst, stoppe und kommentiere exakt:

          "codex-control prompt nicht lesbar"

          Zusätzliche harte Regeln für diesen Dispatch:
          - Keine Codeänderungen.
          - Kein Branch.
          - Kein Pull Request.
          - Keine Commits.
          - Nichts löschen.
          - Nicht nach main pushen.
          - Antworte nur mit einem Planner Report als Kommentar in diesem Issue.
          CODEX_FOOTER
          } > /tmp/codex-request.md

          echo "Posting Codex planner request to issue #$ISSUE_NUMBER"
          cat /tmp/codex-request.md

          gh issue comment "$ISSUE_NUMBER" \
            --repo "$GITHUB_REPOSITORY" \
            --body-file /tmp/codex-request.md
