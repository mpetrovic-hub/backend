name: Codex Dispatcher

on:
  workflow_dispatch:
  # schedule:
  #   - cron: "0 22 * * *"

permissions:
  contents: read
  issues: write

jobs:
  dispatch:
    runs-on: ubuntu-latest

    steps:
      - name: Pick next Codex issue
        id: pick
        env:
          GH_TOKEN: ${{ secrets.GH_CODEX_DISPATCH_TOKEN }}
        run: |
          ISSUE_JSON=$(gh issue list \
            --repo "$GITHUB_REPOSITORY" \
            --state open \
            --label "codex-candidate" \
            --label "codex-ready" \
            --json number,title,url \
            --limit 1)

          ISSUE_NUMBER=$(echo "$ISSUE_JSON" | jq -r '.[0].number // empty')
          ISSUE_TITLE=$(echo "$ISSUE_JSON" | jq -r '.[0].title // empty')
          ISSUE_URL=$(echo "$ISSUE_JSON" | jq -r '.[0].url // empty')

          if [ -z "$ISSUE_NUMBER" ]; then
            echo "No ready Codex issue found."
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Found issue #$ISSUE_NUMBER: $ISSUE_TITLE"
          echo "found=true" >> "$GITHUB_OUTPUT"
          echo "issue_number=$ISSUE_NUMBER" >> "$GITHUB_OUTPUT"
          echo "issue_title=$ISSUE_TITLE" >> "$GITHUB_OUTPUT"
          echo "issue_url=$ISSUE_URL" >> "$GITHUB_OUTPUT"

      - name: Mark issue as dispatched
        if: steps.pick.outputs.found == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_CODEX_DISPATCH_TOKEN }}
          ISSUE_NUMBER: ${{ steps.pick.outputs.issue_number }}
        run: |
          gh issue edit "$ISSUE_NUMBER" \
            --repo "$GITHUB_REPOSITORY" \
            --remove-label "codex-ready" \
            --add-label "codex-dispatched"

      - name: Ask Codex to work on the issue
        if: steps.pick.outputs.found == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_CODEX_DISPATCH_TOKEN }}
          ISSUE_NUMBER: ${{ steps.pick.outputs.issue_number }}
          ISSUE_TITLE: ${{ steps.pick.outputs.issue_title }}
        run: |
          cat > /tmp/codex-request.md <<'EOF'
          @codex

          Bitte bearbeite dieses Issue als Codex-Overnight-Task.

          Regeln:
          - Arbeite auf einem separaten Branch.
          - Niemals direkt nach main pushen.
          - Erstelle am Ende einen Pull Request.
          - Halte die Änderung minimal.
          - Folge exakt dem Issue-Text und den Akzeptanzkriterien.
          - Wenn unklar ist, ob etwas gelöscht oder geändert werden darf, stoppe und kommentiere deine Analyse statt Code zu ändern.

          Workflow:
          1. Analysiere das Issue und den relevanten Code.
          2. Erstelle zuerst einen kurzen Plan als Kommentar.
          3. Implementiere nur, wenn die Nutzung eindeutig geklärt ist.
          4. Führe sinnvolle Checks/Tests aus, soweit im Repo möglich.
          5. Erstelle einen PR mit Summary, Tests und Risiken.

          Für diesen ersten Testballon:
          - Wenn `templates/landing-pages` noch aktiv verwendet wird: nichts löschen, Fundstellen dokumentieren.
          - Wenn der Ordner nicht verwendet wird: Ordner und ausschließlich tote Referenzen entfernen.
          EOF

          gh issue comment "$ISSUE_NUMBER" \
            --repo "$GITHUB_REPOSITORY" \
            --body-file /tmp/codex-request.md
