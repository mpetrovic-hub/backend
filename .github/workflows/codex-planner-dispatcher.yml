name: Codex Planner Dispatcher

on:
  workflow_dispatch:
  # schedule:
  #   - cron: "0 22 * * *"

permissions:
  contents: read
  issues: write

jobs:
  dispatch:
    runs-on: ubuntu-latest

    steps:
      - name: Pick next Codex planner issue
        id: pick
        env:
          GH_TOKEN: ${{ secrets.GH_CODEX_DISPATCH_TOKEN }}
        run: |
          ISSUE_JSON=$(gh issue list \
            --repo "$GITHUB_REPOSITORY" \
            --state open \
            --label "codex-candidate" \
            --label "codex-ready" \
            --json number,title,url \
            --limit 1)

          ISSUE_NUMBER=$(echo "$ISSUE_JSON" | jq -r '.[0].number // empty')
          ISSUE_TITLE=$(echo "$ISSUE_JSON" | jq -r '.[0].title // empty')
          ISSUE_URL=$(echo "$ISSUE_JSON" | jq -r '.[0].url // empty')

          if [ -z "$ISSUE_NUMBER" ]; then
            echo "No ready Codex planner issue found."
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Found issue #$ISSUE_NUMBER: $ISSUE_TITLE"
          echo "found=true" >> "$GITHUB_OUTPUT"
          echo "issue_number=$ISSUE_NUMBER" >> "$GITHUB_OUTPUT"
          echo "issue_title=$ISSUE_TITLE" >> "$GITHUB_OUTPUT"
          echo "issue_url=$ISSUE_URL" >> "$GITHUB_OUTPUT"

      - name: Mark issue as planner dispatched
        if: steps.pick.outputs.found == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_CODEX_DISPATCH_TOKEN }}
          ISSUE_NUMBER: ${{ steps.pick.outputs.issue_number }}
        run: |
          gh issue edit "$ISSUE_NUMBER" \
            --repo "$GITHUB_REPOSITORY" \
            --remove-label "codex-ready" \
            --add-label "codex-dispatched"

      - name: Ask Codex to plan the issue
        if: steps.pick.outputs.found == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_CODEX_DISPATCH_TOKEN }}
          ISSUE_NUMBER: ${{ steps.pick.outputs.issue_number }}
        run: |
          cat > /tmp/codex-request.md <<'CODEX_REQUEST'
          @codex

          Bitte bearbeite dieses Issue ausschließlich im Planner-Mode.

          Lies vor der Analyse zuerst, falls vorhanden:

          1. `AGENTS.md`
          2. `README.md`
          3. `external/codex-control/README.md`
          4. `external/codex-control/STATE.json`
          5. `external/codex-control/prompts/planner.md`

          Falls `external/codex-control/prompts/planner.md` nicht vorhanden oder nicht lesbar ist, versuche zuerst:

          `git submodule update --init --recursive`

          Falls die Datei danach weiterhin nicht lesbar ist:
          - Erstelle keine Datei.
          - Erstelle keinen Branch.
          - Erstelle keinen Pull Request.
          - Mache keinen Commit.
          - Ändere keinen Code.
          - Kommentiere nur im aktuellen Issue exakt:
            "codex-control prompt nicht lesbar"

          Befolge `external/codex-control/prompts/planner.md` als verbindliche Planner-Anweisung.

          Zusätzliche harte Regeln für diesen Dispatch:
          - Keine Codeänderungen.
          - Keine Datei erstellen.
          - Keine Datei bearbeiten.
          - Keine Datei löschen.
          - Kein Branch.
          - Kein Pull Request.
          - Keine Commits.
          - Nicht nach `main` pushen.
          - Antworte nur mit einem Planner Report als Kommentar in diesem Issue.
          CODEX_REQUEST

          echo "Posting Codex planner request to issue #$ISSUE_NUMBER"
          cat /tmp/codex-request.md

          gh issue comment "$ISSUE_NUMBER" \
            --repo "$GITHUB_REPOSITORY" \
            --body-file /tmp/codex-request.md
